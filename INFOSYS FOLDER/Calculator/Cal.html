<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="calculator" aria-label="Calculator">
        <input type="text" id="display" readonly aria-live="polite" placeholder="0">

        <div class="buttons">
            <button onclick="clearDisplay()" class="btn-clear" aria-label="Clear">C</button>
            <button onclick="deleteLast()" class="btn-util" aria-label="Delete last entry">⌫</button>
            <button onclick="appendValue('%')" class="btn-util" aria-label="Percent">%</button>
            <button onclick="appendValue('/')" class="btn-operator" aria-label="Divide">÷</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')" class="btn-operator" aria-label="Multiply">×</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')" class="btn-operator" aria-label="Subtract">-</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('+')" class="btn-operator" aria-label="Add">+</button>
            
            <button onclick="appendValue('00')" class="btn-zero">00</button>
            <button onclick="appendValue('0')" class="btn-zero">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="calculate()" class="btn-equal" aria-label="Equals">=</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
